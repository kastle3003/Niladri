<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course — The Foundation Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:         #080706;
      --ink-soft:    #0f0e0c;
      --ink-mid:     #1a1916;
      --gold:        #C8A84B;
      --gold-bright: #E2C26A;
      --gold-dim:    #8C7033;
      --gold-bg:     rgba(200,168,75,.08);
      --cream:       #F0E6D3;
      --cream-dim:   #b8ad9e;
      --ghost:       rgba(240,230,211,.06);
      --ghost-mid:   rgba(240,230,211,.12);
      --ghost-hi:    rgba(240,230,211,.18);
      --border:      rgba(200,168,75,.15);
      --border-hi:   rgba(200,168,75,.35);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --radius:       4px;
      --max:          1280px;
    }

    html { scroll-behavior: smooth; overflow-x: clip; }
    body {
      background: var(--ink);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 64px;
      display: flex; align-items: center;
      padding: 0 40px;
      background: rgba(8,7,6,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--gold); letter-spacing: .04em; }
    .nav-logo span { font-size: 10px; font-family: var(--font-body); font-weight: 400; color: var(--cream-dim); display: block; letter-spacing: .2em; text-transform: uppercase; margin-top: -4px; }
    .nav-spacer { flex: 1; }
    .nav-btn {
      padding: 9px 24px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
      letter-spacing: .06em; text-transform: uppercase; cursor: pointer; border: none;
      transition: all .2s;
    }
    .nav-ghost { background: transparent; border: 1px solid var(--border-hi); color: var(--cream); margin-right: 12px; }
    .nav-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .nav-gold { background: var(--gold); color: var(--ink); }
    .nav-gold:hover { background: var(--gold-bright); }
    .nav-back { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--cream-dim); margin-right: 24px; transition: color .2s; }
    .nav-back:hover { color: var(--gold); }
    .nav-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ─── HERO BAND ─── */
    #hero {
      margin-top: 64px;
      min-height: 520px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      padding: 72px 60px 72px 80px;
      display: flex; flex-direction: column; justify-content: center;
      position: relative; z-index: 2;
    }
    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      opacity: .55;
    }
    .hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--ink) 40%, transparent 100%);
    }
    .hero-eyebrow {
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      letter-spacing: .25em; text-transform: uppercase; color: var(--gold);
      margin-bottom: 20px;
    }
    .hero-title {
      font-family: var(--font-display); font-size: clamp(38px, 5vw, 64px);
      font-weight: 600; line-height: 1.08; color: var(--cream);
      margin-bottom: 16px;
    }
    .hero-subtitle {
      font-family: var(--font-display); font-size: 22px; font-style: italic;
      color: var(--cream-dim); margin-bottom: 32px; font-weight: 300;
    }
    .hero-meta {
      display: flex; gap: 28px; flex-wrap: wrap;
    }
    .hero-stat { display: flex; flex-direction: column; gap: 4px; }
    .hero-stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--gold); line-height: 1; }
    .hero-stat-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--cream-dim); }

    /* sticky enroll card */
    .enroll-panel {
      background: var(--ink-mid);
      border-left: 1px solid var(--border);
      padding: 48px 36px;
      display: flex; flex-direction: column; align-items: center;
      position: sticky; top: 64px; align-self: start;
      max-height: calc(100vh - 64px);
      overflow-y: auto;
      z-index: 2;
    }
    .enroll-price {
      font-family: var(--font-display); font-size: 42px; font-weight: 600;
      color: var(--gold); margin-bottom: 6px; text-align: center;
    }
    .enroll-price-note { font-size: 12px; color: var(--cream-dim); text-align: center; margin-bottom: 28px; letter-spacing: .06em; }
    .btn-enroll-big {
      width: 100%;
      padding: 16px 24px;
      background: var(--gold);
      color: var(--ink);
      font-size: 14px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: all .25s;
      text-align: center; display: block;
    }
    .btn-enroll-big:hover { background: var(--gold-bright); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,168,75,.25); }
    .btn-enroll-big:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .enroll-divider { width: 100%; border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .enroll-perks { list-style: none; width: 100%; }
    .enroll-perks li {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; color: var(--cream-dim); margin-bottom: 12px; line-height: 1.4;
    }
    .enroll-perks li svg { width: 14px; height: 14px; stroke: var(--gold); fill: none; stroke-width: 2.5; flex-shrink: 0; margin-top: 2px; }
    .enroll-note { font-size: 11px; color: var(--cream-dim); text-align: center; margin-top: 16px; letter-spacing: .04em; }
    .enroll-success {
      display: none;
      flex-direction: column; align-items: center; gap: 12px;
      padding: 20px; background: rgba(200,168,75,.1);
      border: 1px solid var(--border-hi); border-radius: var(--radius);
      text-align: center; margin-bottom: 20px; width: 100%;
    }
    .enroll-success svg { width: 32px; height: 32px; stroke: var(--gold); fill: none; stroke-width: 2; }
    .enroll-success p { font-size: 13px; color: var(--cream-dim); }
    .enroll-success strong { color: var(--gold); font-size: 15px; }

    /* ─── LAYOUT ─── */
    .page-wrap {
      max-width: var(--max); margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      align-items: start;
    }
    .page-main { padding: 80px 60px 80px 80px; }
    .page-side { position: sticky; top: 64px; padding: 0 36px 80px; }

    /* ─── SECTIONS ─── */
    .section { margin-bottom: 72px; }
    .section-label {
      font-size: 11px; font-weight: 500; letter-spacing: .25em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 16px;
    }
    .section-heading {
      font-family: var(--font-display); font-size: 38px; font-weight: 600;
      line-height: 1.15; margin-bottom: 24px; color: var(--cream);
    }
    .section-heading em { font-style: italic; color: var(--gold); }
    .section-body { color: var(--cream-dim); font-size: 15px; line-height: 1.8; }
    .section-body p + p { margin-top: 16px; }
    .section-sep { border: none; border-top: 1px solid var(--border); margin-bottom: 72px; }

    /* outcomes grid */
    .outcomes-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-top: 32px;
    }
    .outcome-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 16px; background: var(--ghost); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 13px; color: var(--cream-dim); line-height: 1.4;
    }
    .outcome-item svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; stroke-width: 2.5; flex-shrink: 0; margin-top: 1px; }

    /* ─── CURRICULUM ─── */
    /* Full-bleed: anchor the section's left edge to viewport x=0 regardless
       of how far right .page-main's content column is pushed by the 380px
       sticky pricing sidebar. The min() picks whichever of the two values
       is more negative, giving the correct margin at every viewport width:
         • 900px ≤ vw ≤ 1280px  →  content_left = 80px, so margin -80px wins
         • vw > 1280px          →  content_left grows as page-wrap centers,
                                    so calc(-50vw + 560px) wins
       (50vw − 560 equals 80 at vw=1280 and 400 at vw=1920 — the exact
       horizontal distance from content column to viewport left.) */
    .curriculum-section {
      width: 100vw;
      margin-left: min(-80px, calc(-50vw + 560px));
      padding: 0 48px;
      box-sizing: border-box;
    }
    .curriculum-section .section-heading { margin-top: 6px; }
    .curriculum-section .foundation-tabs { padding-top: 4px; }
    @media (max-width: 900px) {
      /* Mobile: no sidebar, normal single-column flow */
      .curriculum-section {
        width: 100%;
        margin-left: 0;
        padding: 0 24px;
      }
    }
    .curriculum-summary {
      display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .curr-stat { font-size: 13px; color: var(--cream-dim); }
    .curr-stat strong { color: var(--cream); font-weight: 500; }

    .foundation-tabs {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .foundation-tab {
      background: none; border: 0;
      padding: 12px 20px;
      color: var(--cream-dim);
      font-family: inherit;
      font-size: 13px; font-weight: 500; letter-spacing: .02em;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .foundation-tab:hover { color: var(--cream); }
    .foundation-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .foundation-body {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) 2.6fr;
      gap: 24px;
    }
    @media (max-width: 860px) { .foundation-body { grid-template-columns: 1fr; } }

    .foundation-lessons {
      background: var(--ghost);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
    }
    .lesson-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 2px; }
    .lesson-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      font-size: 13px; color: var(--cream-dim);
      cursor: pointer;
      border-radius: 4px;
      transition: background .15s, color .15s;
      user-select: none;
    }
    .lesson-item:hover { background: var(--ghost-mid); color: var(--cream); }
    .lesson-item.selected {
      background: rgba(200,168,75,.1);
      color: var(--cream);
    }
    .lesson-item.locked { opacity: .75; }
    .lesson-item .l-num { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--gold-dim); min-width: 18px; }
    .lesson-item .l-icon { width: 18px; height: 18px; color: var(--gold); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .lesson-item .l-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: currentColor; }
    .lesson-item.locked .l-icon { color: var(--cream-dim); }
    .lesson-item.locked .l-icon svg { fill: none; stroke-width: 2; }
    .lesson-item.selected .l-icon { color: var(--gold-bright, #E8C96E); }
    .lesson-item .l-name { flex: 1; }
    .lesson-item .l-dur { font-size: 11px; color: var(--cream-dim); font-variant-numeric: tabular-nums; }

    .foundation-player {
      background: var(--ghost);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
    }
    .video-expand-btn {
      position: absolute;
      top: 10px; right: 10px; z-index: 4;
      width: 34px; height: 34px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.2);
      color: var(--cream);
      border-radius: 3px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .video-expand-btn:hover { background: rgba(200,168,75,.35); border-color: var(--gold); }
    .video-expand-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ─── Theater / Full-viewport mode ─── */
    .curriculum-section.theater {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg, #0b0a08);
      padding: 24px 32px;
      margin: 0;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .curriculum-section.theater .section-label,
    .curriculum-section.theater .section-heading,
    .curriculum-section.theater .curriculum-summary { display: none; }
    .curriculum-section.theater .foundation-tabs { margin-bottom: 16px; flex-shrink: 0; }
    .curriculum-section.theater .foundation-body {
      grid-template-columns: 320px 1fr;
      flex: 1;
      min-height: 0;
    }
    .curriculum-section.theater .foundation-lessons { overflow-y: auto; max-height: 100%; }
    .curriculum-section.theater .foundation-player { height: 100%; }
    .curriculum-section.theater .video-slot { aspect-ratio: auto; flex: 1; }
    body.curriculum-theater-on { overflow: hidden; }
    @media (max-width: 860px) {
      .curriculum-section.theater .foundation-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    }
    .video-slot {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }
    .video-slot video, .video-slot iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; display: block; border: 0;
    }
    .video-slot video { background: #000; }
    .video-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity .25s;
    }
    .video-play-btn {
      pointer-events: auto;
      width: 68px; height: 68px; border-radius: 50%;
      background: rgba(200,168,75,.95); color: #0F0D0B;
      border: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, background .15s;
    }
    .video-play-btn:hover { transform: scale(1.06); background: var(--gold-bright, #E8C96E); }
    .video-play-btn svg { width: 28px; height: 28px; fill: currentColor; }
    .video-slot.playing .video-overlay { opacity: 0; }
    .video-slot.playing:hover .video-overlay { opacity: 1; }

    .video-progress-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: rgba(255,255,255,.12);
      pointer-events: none;
    }
    .video-progress-fill {
      height: 100%; background: var(--gold);
      width: 0%;
    }

    .video-title-row {
      padding: 12px 16px;
      font-size: 13px; color: var(--cream);
      border-top: 1px solid var(--border);
      background: var(--ghost-mid);
      min-height: 42px;
    }

    .video-locked {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--cream-dim); padding: 24px; text-align: center;
      background: #0a0907;
    }
    .video-locked svg { width: 36px; height: 36px; color: var(--gold-dim); margin-bottom: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    .video-locked h3 { font-family: var(--font-display); font-size: 20px; color: var(--cream); margin: 0 0 6px; }
    .video-locked p { font-size: 13px; margin: 0 0 14px; max-width: 340px; }
    .video-locked .cta-row { display: flex; gap: 10px; }
    .video-locked a {
      background: var(--gold); color: #0F0D0B;
      padding: 9px 18px; border-radius: 3px; font-weight: 600;
      text-decoration: none; font-size: 12px; letter-spacing: .05em;
      transition: background .15s;
    }
    .video-locked a.outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 17px; }
    .video-locked a:hover { background: var(--gold-bright, #E8C96E); color: #0F0D0B; }
    .video-locked a.outline:hover { background: var(--gold); color: #0F0D0B; }

    /* ─── INSTRUCTOR ─── */
    .instructor-card-pub {
      display: flex; gap: 28px; align-items: flex-start;
      padding: 36px; background: var(--ghost); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .instructor-avatar-big {
      width: 96px; height: 96px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 32px; font-weight: 600;
      color: var(--gold); flex-shrink: 0;
      border: 2px solid var(--border-hi);
    }
    .instructor-info-name { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--cream); margin-bottom: 4px; }
    .instructor-info-subject { font-size: 12px; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .instructor-info-bio { font-size: 14px; color: var(--cream-dim); line-height: 1.8; }

    /* ─── TESTIMONIALS ─── */
    .testi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 28px; }
    .testi-card {
      padding: 28px; background: var(--ghost); border: 1px solid var(--border);
      border-radius: var(--radius); position: relative;
    }
    .testi-mark { font-family: var(--font-display); font-size: 60px; color: var(--gold-dim); line-height: .8; margin-bottom: 12px; display: block; }
    .testi-text { font-size: 14px; color: var(--cream-dim); line-height: 1.7; margin-bottom: 16px; font-style: italic; }
    .testi-author { font-size: 12px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--cream); }
    .testi-origin { font-size: 11px; color: var(--cream-dim); margin-top: 2px; }
    .stars { display: flex; gap: 3px; margin-bottom: 12px; }
    .star { width: 10px; height: 10px; background: var(--gold); clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }

    /* ─── BOTTOM ENROLL CTA ─── */
    .bottom-cta {
      background: linear-gradient(135deg, var(--ink-mid) 0%, #141210 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 52px 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 40px;
      margin: 0 80px 80px;
    }
    .bottom-cta-text h2 { font-family: var(--font-display); font-size: 38px; font-weight: 600; color: var(--cream); margin-bottom: 8px; }
    .bottom-cta-text h2 em { font-style: italic; color: var(--gold); }
    .bottom-cta-text p { font-size: 15px; color: var(--cream-dim); }
    .bottom-cta-action { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .btn-enroll-bottom {
      padding: 18px 48px; background: var(--gold); color: var(--ink);
      font-size: 14px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: all .25s; white-space: nowrap;
    }
    .btn-enroll-bottom:hover { background: var(--gold-bright); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(200,168,75,.3); }
    .bottom-cta-note { font-size: 11px; color: var(--cream-dim); text-align: center; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 80px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-logo { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--gold); }
    .footer-copy { font-size: 12px; color: var(--cream-dim); }

    /* ─── LOADING SKELETON ─── */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 20px;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 2px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: var(--font-display); font-size: 20px; color: var(--cream-dim); }

    /* ─── ERROR STATE ─── */
    .error-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 16px; padding: 40px;
    }
    .error-code { font-family: var(--font-display); font-size: 80px; color: var(--border); line-height: 1; }
    .error-msg { font-family: var(--font-display); font-size: 24px; color: var(--cream-dim); }
    .error-link { margin-top: 12px; padding: 12px 28px; border: 1px solid var(--border-hi); border-radius: var(--radius); font-size: 13px; color: var(--cream-dim); transition: all .2s; }
    .error-link:hover { border-color: var(--gold); color: var(--gold); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {

// ─── Helpers ────────────────────────────────────────────────────────────────
function qs(sel, ctx) { return (ctx || document).querySelector(sel); }
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

// ─── Get course slug or id from URL ─────────────────────────────────────────
// Supports both SEO URLs (/courses/sitar-the-complete-foundation)
// and legacy query strings (?id=1) for backward compatibility
let courseId = null;
const pathParts = window.location.pathname.split('/');
const slugFromPath = pathParts[pathParts.length - 1]; // last segment
if (slugFromPath && slugFromPath !== 'course-landing.html' && slugFromPath !== '') {
  courseId = slugFromPath; // slug (string) or numeric id
} else {
  const params = new URLSearchParams(window.location.search);
  courseId = params.get('id');
}

if (!courseId) {
  showError('No course specified.');
}

// ─── Auth helpers ────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('archive_token'); }
function isLoggedIn() { return !!getToken(); }
async function checkEnrolled(id) {
  try {
    const r = await fetch('/api/enrollments', { headers: { Authorization: 'Bearer ' + getToken() } });
    if (!r.ok) return false;
    const d = await r.json();
    return (d.enrollments || []).some(e => e.course_id == id);
  } catch { return false; }
}

// ─── Enrollment ──────────────────────────────────────────────────────────────
async function handleEnroll(courseId) {
  if (!isLoggedIn()) {
    sessionStorage.setItem('tfr_enroll_after_login', courseId);
    window.location.href = '/login#panel-register';
    return;
  }
  const btns = document.querySelectorAll('.enroll-trigger');
  btns.forEach(b => { b.disabled = true; b.textContent = 'Enrolling…'; });
  try {
    const r = await fetch('/api/enrollments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken() },
      body: JSON.stringify({ course_id: courseId })
    });
    const d = await r.json();
    if (r.ok || d.message?.includes('already')) {
      // Show success state
      document.querySelectorAll('.enroll-success').forEach(s => { s.style.display = 'flex'; });
      btns.forEach(b => { b.textContent = 'Go to Course →'; b.disabled = false; b.onclick = () => { window.location.href = '/student-dashboard.html'; }; });
    } else {
      btns.forEach(b => { b.textContent = 'Enroll Now'; b.disabled = false; });
      alert(d.error || 'Enrollment failed. Please try again.');
    }
  } catch {
    btns.forEach(b => { b.textContent = 'Enroll Now'; b.disabled = false; });
    alert('Network error. Please try again.');
  }
}

// ─── Format duration ─────────────────────────────────────────────────────────
function fmtDur(min) {
  if (!min) return '';
  if (min < 60) return min + 'm';
  const h = Math.floor(min / 60), m = min % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

          <li><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Recording upload &amp; feedback</li>

      const obj = { v: 0 };

(async () => {
  if (!courseId) return;
  try {
    const r = await fetch(`/api/public/courses/${courseId}`);
    if (!r.ok) throw new Error('Not found');
    const data = await r.json();
    await renderPage(data);

    // Auto-enroll if redirected back after login
    const pendingCourse = sessionStorage.getItem('tfr_enroll_after_login');
    if (pendingCourse && isLoggedIn() && pendingCourse == courseId) {
      sessionStorage.removeItem('tfr_enroll_after_login');
      await handleEnroll(courseId);
    }
  } catch (e) {
    showError('Course not found or unavailable.');
  }
})();

// ─── CURRICULUM: FOUNDATION TABS + INLINE PLAYER ─────────────────────────────
// Replaces the old accordion + modal popup. Lessons render on the left, the
// selected lesson's video plays in the embedded player on the right. Video
// controls are custom (play/pause + visual-only progress bar) — no seeker,
// no keyboard seeking, no right-click menu.
let _landingData = null;
const _origRenderForFoundations = renderPage;
renderPage = async function patched(data) {
  _landingData = data;
  const out = await _origRenderForFoundations.call(this, data);
  // Initialize first foundation after DOM is rendered
  if ((data.chapters || []).length) {
    selectFoundation(data.chapters[0].id, /*autoLoadVideo*/ true);
  }
  return out;
};

function _playIconSvg() {
  return '<svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg>';
}
function _lockIconSvg() {
  return '<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>';
}

function selectFoundation(chId, autoLoadVideo) {
  document.querySelectorAll('.foundation-tab').forEach(b =>
    b.classList.toggle('active', String(b.dataset.ch) === String(chId))
  );
  renderLessonList(chId);
  if (autoLoadVideo) {
    const first = _findFirstPlayable(chId);
    if (first) {
      _loadLessonIntoPlayer(first, /*autoplay*/ false);
      _markSelectedLesson(chId, first.id);
    } else {
      _showLockedPlayer('No free preview in this foundation');
    }
  }
}

function _findFirstPlayable(chId) {
  const ch = (_landingData.chapters || []).find(c => String(c.id) === String(chId));
  if (!ch) return null;
  return (ch.lessons || []).find(l =>
    l.is_preview && (l.materials || []).some(m => m.type === 'video' && m.url)
  ) || null;
}

function renderLessonList(chId) {
  const ch = (_landingData.chapters || []).find(c => String(c.id) === String(chId));
  const list = document.getElementById('foundation-lesson-list');
  if (!list) return;
  if (!ch || !(ch.lessons || []).length) {
    list.innerHTML = '<li class="lesson-item locked" style="cursor:default;"><span class="l-name" style="color:var(--cream-dim);">No lessons in this foundation yet.</span></li>';
    return;
  }
  list.innerHTML = (ch.lessons || []).map((l, i) => {
    const video = (l.materials || []).find(m => m.type === 'video' && m.url);
    const playable = l.is_preview && video;
    const click = playable
      ? `onclick="selectLesson('${ch.id}', ${l.id})"`
      : `onclick="_showLockedPlayer(this.dataset.title)"`;
    return `<li class="lesson-item${playable ? '' : ' locked'}" data-lesson="${l.id}" data-title="${(l.title || '').replace(/"/g,'&quot;')}" ${click}>
      <span class="l-num">${i + 1}</span>
      <span class="l-icon">${playable ? _playIconSvg() : _lockIconSvg()}</span>
      <span class="l-name">${l.title || ''}</span>
      <span class="l-dur">${l.duration_minutes ? fmtDur(l.duration_minutes) : ''}</span>
    </li>`;
  }).join('');
}

function _markSelectedLesson(chId, lessonId) {
  document.querySelectorAll('#foundation-lesson-list .lesson-item').forEach(li =>
    li.classList.toggle('selected', String(li.dataset.lesson) === String(lessonId))
  );
}

function selectLesson(chId, lessonId) {
  const ch = (_landingData.chapters || []).find(c => String(c.id) === String(chId));
  const lesson = ch && (ch.lessons || []).find(l => l.id === lessonId);
  if (!lesson) return;
  _markSelectedLesson(chId, lessonId);
  _loadLessonIntoPlayer(lesson, /*autoplay*/ true);
}

function _loadLessonIntoPlayer(lesson, autoplay) {
  const slot = document.getElementById('video-slot');
  const titleEl = document.getElementById('video-title');
  const vid = (lesson.materials || []).find(m => m.type === 'video' && m.url);
  if (!vid) { _showLockedPlayer(lesson.title); return; }

  const url = vid.url;
  const isIframeHost = /youtube\.com|youtu\.be|vimeo\.com/i.test(url);
  slot.classList.remove('playing');

  if (isIframeHost) {
    const embed = _toEmbed(url);
    const sep = embed.includes('?') ? '&' : '?';
    slot.innerHTML = `<iframe src="${embed}${autoplay ? sep + 'autoplay=1' : ''}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
  } else {
    // HTML5 video with custom no-seeker controls
    slot.innerHTML = `
      <video preload="auto" playsinline oncontextmenu="return false;" src="${url}"></video>
      <div class="video-overlay">
        <button class="video-play-btn" aria-label="Play" type="button">${_playIconSvg()}</button>
      </div>
      <div class="video-progress-bar"><div class="video-progress-fill" id="video-progress-fill"></div></div>
    `;
    const v = slot.querySelector('video');
    const btn = slot.querySelector('.video-play-btn');
    const fill = slot.querySelector('.video-progress-fill');
    const toggle = () => { if (v.paused) v.play().catch(()=>{}); else v.pause(); };
    btn.addEventListener('click', toggle);
    v.addEventListener('click', toggle);
    v.addEventListener('play', () => slot.classList.add('playing'));
    v.addEventListener('pause', () => slot.classList.remove('playing'));
    v.addEventListener('ended', () => slot.classList.remove('playing'));
    // Visual-only progress
    v.addEventListener('timeupdate', () => {
      if (v.duration) fill.style.width = ((v.currentTime / v.duration) * 100) + '%';
    });
    // Anti-scrub: if any code tries to seek, snap back. (UI exposes no seek path,
    // but this blocks keyboard shortcuts and programmatic seeks.)
    let _lastT = 0;
    v.addEventListener('timeupdate', () => { _lastT = v.currentTime; });
    v.addEventListener('seeking', () => {
      if (Math.abs(v.currentTime - _lastT) > 1.25) {
        v.currentTime = _lastT;
      }
    });
    if (autoplay) v.play().catch(() => {});
  }
  titleEl.textContent = lesson.title || '';
}

function _showLockedPlayer(title) {
  const slot = document.getElementById('video-slot');
  const titleEl = document.getElementById('video-title');
  slot.classList.remove('playing');
  slot.innerHTML = `
    <div class="video-locked">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <h3>${title || 'This lesson is locked'}</h3>
      <p>Sign in or join now to access all lessons in this course.</p>
      <div class="cta-row">
        <a class="outline" href="/index.html">Sign In</a>
        <a href="#" onclick="const b=document.querySelector('.enroll-trigger'); if(b){b.click(); return false;}">Join Now</a>
      </div>
    </div>
  `;
  titleEl.textContent = '';
}

function _toEmbed(url) {
  const id = (url.match(/youtu\.be\/([\w-]+)/) || [])[1]
          || (url.match(/[?&]v=([\w-]+)/) || [])[1]
          || (url.match(/youtube\.com\/embed\/([\w-]+)/) || [])[1];
  return id ? `https://www.youtube.com/embed/${id}` : url;
}

function toggleCurriculumTheater() {
  const section = document.querySelector('.curriculum-section');
  if (!section) return;
  const on = section.classList.toggle('theater');
  document.body.classList.toggle('curriculum-theater-on', on);
  const btn = document.getElementById('video-expand-btn');
  if (btn) {
    btn.setAttribute('aria-label', on ? 'Shrink' : 'Expand');
    btn.setAttribute('title', on ? 'Exit full-size (Esc)' : 'Expand to full-size');
    btn.innerHTML = on
      ? '<svg viewBox="0 0 24 24"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>'
      : '<svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
  }
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  const section = document.querySelector('.curriculum-section');
  if (section && section.classList.contains('theater')) toggleCurriculumTheater();
});
</script>
